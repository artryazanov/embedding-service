name: Docker Publish

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to allow Action to upload packages

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Login to GitHub Container Registry using default token
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          # Push only if it's a branch push (not a Pull Request)
          push: ${{ github.event_name != 'pull_request' }}
          # Use full registry name
          tags: ghcr.io/artryazanov/embedding-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
